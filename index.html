<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oversize Hub</title>
<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background-color: #fff;
  color: #333;
}

/* Slider Container */
.slider {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
}
.slides {
  display: flex;
  width: 300%;
  height: 300px;
  transition: transform 1s ease-in-out;
}
.slides img {
  width: 100%;
  height: auto;
  max-height: 300px;
  object-fit: cover;
}

/* Navigation Dots */
.dots {
  text-align: center;
  position: absolute;
  bottom: 10px;
  width: 100%;
}
.dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin: 0 5px;
  background-color: #bbb;
  border-radius: 50%;
  cursor: pointer;
}
.dot.active {
  background-color: #333;
}

/* Main Content */
h1 {
  text-align: center;
  color: #444;
  margin-top: 20px;
}
h2 {
  text-align: center;
  color: #666;
  font-weight: normal;
}
.card {
  width: 300px;
  margin: 30px auto;
  background: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  border-radius: 10px;
  text-align: center;
  padding: 20px;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.price {
  color: green;
  font-weight: bold;
}
button {
  background-color: #25D366;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}
button:hover {
  background-color: #1EBE57;
}

/* About Us */
.about {
  text-align: center;
  margin: 40px auto;
  width: 80%;
}
.about h3 {
  color: #FF7F50;
}
footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}
</style>
</head>
<body>

<!-- Slider with Clickable Dots -->
<div class="slider">
  <div class="slides" id="slides">
    <img src="images/anime.jpg" alt="Anime Demon Slayer">
    <img src="images/formula1.jpg" alt="Formula 1 Racing">
    <img src="images/shinchan.jpg" alt="Shinchan Cartoon">
  </div>
  <div class="dots">
    <span class="dot active" onclick="showSlide(0)"></span>
    <span class="dot" onclick="showSlide(1)"></span>
    <span class="dot" onclick="showSlide(2)"></span>
  </div>
</div>

<!-- Main Content -->
<h1>Oversize Hub</h1>
<h2>Comfort meets style</h2>

<div class="card">
  <img src="images/tshirt.jpg" alt="Oversized T-shirt">
  <h3>Oversized T-shirt</h3>
  <p class="price">₹549</p>
  <button>Order on WhatsApp</button>
</div>

<div class="about">
  <h3>About Us</h3>
  <p>Oversize Hub is dedicated to providing comfortable and stylish oversized clothing. We focus on quality, perfect fit, and everyday wear that makes you feel confident and relaxed.</p>
</div>

<footer>© 2026 Oversize Hub</footer>

<script>
let currentSlide = 0;
const slides = document.getElementById("slides");
const dots = document.querySelectorAll(".dot");

function showSlide(index) {
  currentSlide = index;
  slides.style.transform = `translateX(-${index * 100}%)`;
  dots.forEach(dot => dot.classList.remove("active"));
  dots[index].classList.add("active");
}

// Auto-slide every 5 seconds
setInterval(() => {
  currentSlide = (currentSlide + 1) % 3;
  showSlide(currentSlide);
}, 5000);
</script>

</body>
</html>
