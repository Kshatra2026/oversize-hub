<!DOCTYPE html>
<html>
<head>
  <title>Oversize Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f8;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #ccc;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .product {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
    }

    .product-content {
      padding: 15px;
      text-align: center;
    }

    .product h3 {
      margin: 10px 0;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: black;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Oversize Hub</h1>
  <p>Comfort meets style</p>
</header>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/300">
    <div class="product-content">
      <h3>Black Oversized Tee</h3>
      <p class="price">₹599</p>
      <a href="https://wa.me/918355958682">
        <button>Order on WhatsApp</button>
      </a>
    </div>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300">
    <div class="product-content">
      <h3>White Oversized Tee</h3>
      <p class="price">₹549</p>
      <a href="https://wa.me/918355816066">
        <button>Order on WhatsApp</button>
      </a>
    </div>
  </div>

</div>

<!-- ABOUT US SECTION -->
<div style="padding: 20px; text-align:center;">
  <h2>About Us</h2>
  <p>
    Oversize Hub is dedicated to providing comfortable and stylish oversized clothing. 
    We focus on quality, perfect fit, and everyday wear that makes you feel confident and relaxed.
  </p>
</div>

<footer>
  <p>© 2026 Oversize Hub</p>
</footer>

</body>
</html>
