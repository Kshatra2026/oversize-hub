<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oversize Hub</title>
<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background-color: #fff;
  color: #333;
}

/* Auto-Sliding Anime Header */
.anime-scroll {
  display: flex;
  width: 300%;
  height: 300px;
  animation: slideAnime 12s infinite;
}
.scroll-item {
  flex: 0 0 100%;
}
.scroll-item img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* Animation */
@keyframes slideAnime {
  0% { transform: translateX(0%); }
  33% { transform: translateX(-100%); }
  66% { transform: translateX(-200%); }
  100% { transform: translateX(0%); }
}

/* Main Content */
h1 {
  text-align: center;
  color: #444;
  margin-top: 20px;
}
h2 {
  text-align: center;
  color: #666;
  font-weight: normal;
}
.card {
  width: 300px;
  margin: 30px auto;
  background: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  border-radius: 10px;
  text-align: center;
  padding: 20px;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.price {
  color: green;
  font-weight: bold;
}
button {
  background-color: #25D366;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}
button:hover {
  background-color: #1EBE57;
}

/* About Us */
.about {
  text-align: center;
  margin: 40px auto;
  width: 80%;
}
.about h3 {
  color: #FF7F50;
}
footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}
</style>
</head>
<body>

<!-- Auto-Sliding Header -->
<div class="anime-scroll">
  <div class="scroll-item">
    <img src="https://upload.wikimedia.org/wikipedia/en/0/0b/Tanjiro_Kamado.png" alt="Demon Slayer">
  </div>
  <div class="scroll-item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/F1_2022_Austria_GP.jpg" alt="Formula 1 Racing">
  </div>
  <div class="scroll-item">
    <img src="https://upload.wikimedia.org/wikipedia/en/8/88/Shinchan_character.png" alt="Shinchan">
  </div>
</div>

<!-- Main Content -->
<h1>Oversize Hub</h1>
<h2>Comfort meets style</h2>

<div class="card">
  <img src="https://images.unsplash.com/photo-1618354691385-1e3d9f2f0a3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Oversized T-shirt">
  <h3>Oversized T-shirt</h3>
  <p class="price">₹549</p>
  <button>Order on WhatsApp</button>
</div>

<div class="about">
  <h3>About Us</h3>
  <p>Oversize Hub is dedicated to providing comfortable and stylish oversized clothing. We focus on quality, perfect fit, and everyday wear that makes you feel confident and relaxed.</p>
</div>

<footer>© 2026 Oversize Hub</footer>

</body>
</html>
